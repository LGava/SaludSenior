<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Iniciar Sesion</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <header class="header">

        <div class="logo">
            <span class="material-symbols-rounded icono">medical_services</span>
            <h2>Salud Senior</h2>
        </div>

        <nav class="nav">
            <ul>
                <li><a href="inicio.html"><span class="icono material-symbols-rounded">home</span>Inicio</a></li>
                <li><a href="registro.html"><span class="icono material-symbols-rounded">person</span>Registrarse</a></li>
                <li><a href="ayuda.html"><span class="icono material-symbols-rounded">help</span>Ayuda</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="login">

            <h1>Iniciar sesion</h1>
            <p>
                Ingrese sus datos para acceder a su cuenta.
            </p>

            <form id="formLogin">

                <label>DNI</label>
                <input type="text" id="dni" placeholder="Ingrese su DNI">

                <label> Contraseña </label>
                <input type="password" id="clave" placeholder="Ingrese su contraseña">

                <button type="submit" id="btnIngresar">
                    Ingresar
                </button>

            </form>

            <div class="opciones">

                <a href="recuperar.html">
                    ¿Olvido su contraseña?
                </a>

                <a href="registro.html">
                    Registrarse
                </a>

            </div>

            <button class="volver" onclick="location.href='index.html'">
                Volver al inicio
            </button>

        </section>
    </main>

    <footer>
        <p>
            © 2026 Salud Senior
        </p>
    </footer>

    <script src="js/login.js"></script>

</body>
</html>
