<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrarse | Salud Senior</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <header class="header">

        <div class="logo">
            <span class="material-symbols-rounded icono">medical_services</span>
            <h2>Salud Senior</h2>
        </div>

        <nav class="nav">
            <ul>
                <li><a href="inicio.html"><span class="icono material-symbols-rounded">home</span>Inicio</a></li>
                <li><a href="login.html"><span class="icono material-symbols-rounded">person</span>Iniciar sesion</a></li>
                <li><a href="ayuda.html"><span class="icono material-symbols-rounded">help</span>Ayuda</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="registro-pro">

            <h1>Crear cuenta de paciente</h1>
            <p class="subtitulo">Complete sus datos para acceder al sistema de turnos</p>

            <!-- PROGRESO -->
            <div class="progreso">
                <div class="paso activo">1</div>
                <div class="linea"></div>
                <div class="paso">2</div>
                <div class="linea"></div>
                <div class="paso">3</div>
            </div>

            <form id="formRegistro">

                <!-- PASO 1 -->
                <div class="paso-form activo" id="paso1">

                    <h2>Datos personales</h2>

                    <label>Nombre</label>
                    <input type="text" id="nombre">

                    <label>Apellido</label>
                    <input type="text" id="apellido">

                    <label>DNI</label>
                    <input type="text" id="dni">

                    <button type="button" class="btn-siguiente-paso" data-next="paso2">
                        Continuar
                    </button>

                </div>

                <!-- PASO 2 -->
                <div class="paso-form" id="paso2">

                    <h2>Contacto</h2>

                    <label>Teléfono</label>
                    <input type="text" id="telefono">

                    <label>Correo electrónico</label>
                    <input type="email" id="correo">

                    <button type="button" class="btn-volver-paso" data-prev="paso1">
                        Volver
                    </button>

                    <button type="button" class="btn-siguiente-paso" data-next="paso3">
                        Continuar
                    </button>

                </div>

                <!-- PASO 3 -->
                <div class="paso-form" id="paso3">

                    <h2>Seguridad</h2>

                    <label>Contraseña</label>
                    <input type="password" id="clave">

                    <label>Confirmar contraseña</label>
                    <input type="password" id="confirmar">

                    <button type="button" class="btn-volver-paso" data-prev="paso2">
                        Volver
                    </button>

                    <button type="submit" class="btn-final">
                        Crear cuenta
                    </button>

                </div>

            </form>

            <p id="mensaje"></p>

        </section>
    </main>

    <footer>
        <p>
            © 2026 Salud Senior
        </p>
    </footer>

    <script src="js/registro.js"></script>

</body>
</html>
