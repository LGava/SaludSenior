<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Elegir Horario</title>

    <link rel="stylesheet" href="css/elegirHorario.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

</head>

<body>

    <main class="contenedor-principal">

        <header>

            <div class="logo">
                <h2>🩺 Salud Senior</h2>
            </div>

            <nav>
                <ul>
                    <li><a href="inicio.html">Inicio</a></li>
                    <li><a href="misDatos.html">Mis datos</a></li>
                    <li><a href="ayuda.html">Ayuda</a></li>
                </ul>
            </nav>

            <div class="usuario">
                <p>Hola, Maria</p>
            </div>

        </header>

        <section class="encabezado">

            <h1>Elegir Horario</h1>

        </section>

        <section class="fecha-seleccionada">

            <h3>Fecha seleccionada</h3>

            <p id="texto-fecha">

                Jueves 17 de Junio

            </p>

        </section>

        <section class="leyenda">

            <div class="estado-fecha">

                <span class="circulo-disponible"></span>
                <span>Disponible</span>

            </div>

            <div class="estado-fecha">

                <span class="circulo-ocupado"></span>
                <span>Ocupado</span>

            </div>

            <div class="estado-fecha">

                <span class="circulo-feriado"></span>
                <span>Feriado</span>

            </div>

        </section>

        <section class="horarios">

            <h2>Horarios disponibles</h2>

            <div class="lista-horarios">

                <button class="hora-disponible">08:00</button>
                <button class="hora">08:30</button>

                <button class="hora-disponible">09:00</button>
                <button class="hora-disponible">09:30</button>

                <button class="hora-disponible">10:00</button>
                <button class="hora">10:30</button>

                <button class="hora-disponible">11:00</button>
                <button class="hora-disponible">11:30</button>

                <button class="hora-disponible">12:00</button>
                <button class="hora">12:30</button>

                <button class="hora">13:00</button>
                <button class="hora-disponible">13:30</button>

            </div>

        </section>



        <section class="navegacion">

            <button class="btn-volver" data-anterior="elegirFecha.html">

                <span class="material-symbols-outlined">

                    arrow_back

                </span>

                Volver

            </button>

            <span class="paso">

                5 de 5

            </span>

            <button class="btn-siguiente" disabled data-siguiente="resumenTurno.html">
                Siguiente

                <span class="material-symbols-outlined">
                    arrow_forward
                </span>



            </button>

        </section>

        <footer>
            <div>
                <h3>Contacto</h3>
                <p>0800-123-456</p>
                <p>saludsenior@gmail.com</p>
            </div>

            <div>
                <h3>Horario</h3>
                <p>Lunes a viernes</p>
                <p>08:00 a 18:00</p>
            </div>

            <div>
                <button id="cerrarSesion">
                    Cerrar sesion
                </button>
            </div>
        </footer>

    </main>
    <script src="js/navegacion.js"></script>

</body>

</html>
