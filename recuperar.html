<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Recuperar contraseña | Salud Senior</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <header>

        <div class="logo">
            <h2>🩺 Salud Senior</h2>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="login.html">Iniciar sesion</a></li>
                <li><a href="registro.html">Registrarse</a></li>
            </ul>
        </nav>

    </header>

    <main>
        <section class="recuperar">

            <h1>¿Olvido su contraseña?</h1>

            <p>
                Escriba su DNI o correo electronico.
                Le enviaremos instrucciones para recuperar el acceso.
            </p>

            <form id="formRecuperar">

                <label>DNI</label>
                <input type="text" id="dni" placeholder="Ejemplo: 30123456">

                <p class="o">O</p>

                <label>Correo electronico</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com">

                <button type="submit">
                    Enviar instrucciones
                </button>

            </form>

            <button class="volver" onclick="location.href='login.html'">
                Volver al inicio de sesion
            </button>

        </section>
    </main>

    <footer>
        <p>
            © 2026 Salud Senior
        </p>
    </footer>

    <script src="js/recuperar.js"></script>

</body>
</html>
